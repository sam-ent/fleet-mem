name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check fleet_mem/ tests/
          ruff format --check fleet_mem/ tests/
      - name: Test
        run: pytest tests/ -v

  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        run: pip install build && python -m build --wheel
      - name: Install from wheel (no extras)
        run: |
          python -m venv /tmp/test-base
          /tmp/test-base/bin/pip install dist/*.whl
          /tmp/test-base/bin/python -c "from fleet_mem.server import main; print('base install OK')"
          /tmp/test-base/bin/python -c "from fleet_mem.observability import configure_logging; configure_logging(); print('structlog OK')"
          /tmp/test-base/bin/python -c "from fleet_mem.fleet.sessions import register_agent; print('sessions OK')"
      - name: Install from wheel (with monitor extras)
        run: |
          python -m venv /tmp/test-monitor
          /tmp/test-monitor/bin/pip install "dist/*.whl[monitor]"
          /tmp/test-monitor/bin/fleet-mem --help
          /tmp/test-monitor/bin/python -c "from fleet_mem.monitor.app import FleetMonitorApp; print('monitor OK')"

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t fleet-mem-ci .
      - name: Verify imports in container
        run: |
          docker run --rm fleet-mem-ci python -c "
          from fleet_mem.server import main; print('server OK')
          from fleet_mem.observability import configure_logging; configure_logging(); print('observability OK')
          from fleet_mem.fleet.sessions import register_agent; print('sessions OK')
          "
